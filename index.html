<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Spooks | Tiny Prophecy</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Playpen+Sans:wght@100..800&family=Walter+Turncoat&display=swap"
    rel="stylesheet">
  <link rel="icon" type="image/x-icon" href="./assets/favicon.ico">
  <link rel="stylesheet" href="./style.css">
</head>

<body>
  <!-- App Layout -->
  <main class="page">
    <!-- Story Screen -->
    <section class="story-screen" aria-live="polite">
      <!-- Decorative Hero Art -->
      <img class="pumpkin-art" src="./assets/pumpkin.png" alt="" />

      <!-- Story Card -->
      <article class="story-card">
        <div class="story-card__inner">
          <!-- Story Content -->
          <h1 id="story-title" class="story-title">Loading...</h1>
          <div class="story-description">
            <p id="story-description">Loading story...</p>
          </div>
        </div>
      </article>
    </section>
  </main>

  <!-- App Script -->
  <script src="./scripts.js"></script>
</body>

</html>
